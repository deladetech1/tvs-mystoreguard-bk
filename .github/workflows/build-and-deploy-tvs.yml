name: Build & Deploy MyStoreGuard Backend (TVS)

on:
  # Prod (main / bgclt-prod) deploys are MANUAL — use the Actions "Run workflow"
  # button (workflow_dispatch) on that branch. Only dev auto-deploys on push.
  push:
    branches:
      - dev
    paths:
      - "app/**"
      - "func/**"
      - ".github/workflows/build-and-deploy-tvs.yml"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What to deploy (manual runs only)"
        type: choice
        default: all
        options:
          - all
          - containerapp
          - functions

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  SERVICE_NAME: mystoreguard
  DOCKERFILE_PATH: app/Dockerfile
  BUILD_CONTEXT: .

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.changes.outputs.app }}
      func_changed: ${{ steps.changes.outputs.func }}
    steps:
      - uses: actions/checkout@v5

      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'app/**'
              - '.github/workflows/build-and-deploy-tvs.yml'
            func:
              - 'func/**'
              - '.github/workflows/build-and-deploy-tvs.yml'

  build-and-deploy-app:
    name: Build & Deploy Container App
    needs: detect-changes
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.app_changed == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.deploy_target == 'all' || inputs.deploy_target == 'containerapp'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
            echo "acr_name=${{ vars.TVS_PROD_ACR }}" >> "$GITHUB_OUTPUT"
            echo "subscription_id=${{ vars.TVS_PROD_SUBSCRIPTION_ID }}" >> "$GITHUB_OUTPUT"
            echo "container_app_name=tvs-prod-mystoreguard-ca" >> "$GITHUB_OUTPUT"
            echo "resource_group=${{ vars.TVS_PROD_APPSERVERS_RG }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == "bgclt-prod" ]]; then
            echo "env=bgclt-prod" >> "$GITHUB_OUTPUT"
            echo "acr_name=${{ vars.BGCLT_PROD_ACR }}" >> "$GITHUB_OUTPUT"
            echo "subscription_id=${{ vars.BGCLT_SUBSCRIPTION_ID }}" >> "$GITHUB_OUTPUT"
            echo "container_app_name=bgclt-prod-mystoreguard-ca" >> "$GITHUB_OUTPUT"
            echo "resource_group=${{ vars.BGCLT_PROD_APPSERVERS_RG }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
            echo "acr_name=${{ vars.TVS_DEV_ACR }}" >> "$GITHUB_OUTPUT"
            echo "subscription_id=${{ vars.TVS_DEV_SUBSCRIPTION_ID }}" >> "$GITHUB_OUTPUT"
            echo "container_app_name=tvs-dev-mystoreguard-ca" >> "$GITHUB_OUTPUT"
            echo "resource_group=${{ vars.TVS_DEV_APPSERVERS_RG }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ github.ref_name == 'bgclt-prod' && vars.BGCLT_AZURE_CLIENT_ID || vars.TVS_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.TVS_TENANT_ID }}
          subscription-id: ${{ steps.env.outputs.subscription_id }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ steps.env.outputs.acr_name }}

      - name: Build and push Docker image
        id: build
        run: |
          ACR_LOGIN_SERVER="${{ steps.env.outputs.acr_name }}.azurecr.io"
          IMAGE_TAG="${{ github.run_number }}"

          docker build \
            -t "${ACR_LOGIN_SERVER}/${{ env.SERVICE_NAME }}:${IMAGE_TAG}" \
            -t "${ACR_LOGIN_SERVER}/${{ env.SERVICE_NAME }}:latest" \
            -f ${{ env.DOCKERFILE_PATH }} \
            ${{ env.BUILD_CONTEXT }}

          docker push "${ACR_LOGIN_SERVER}/${{ env.SERVICE_NAME }}:${IMAGE_TAG}"
          docker push "${ACR_LOGIN_SERVER}/${{ env.SERVICE_NAME }}:latest"

          echo "image=${ACR_LOGIN_SERVER}/${{ env.SERVICE_NAME }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ steps.env.outputs.container_app_name }} \
            --resource-group ${{ steps.env.outputs.resource_group }} \
            --image ${{ steps.build.outputs.image }}

  deploy-functions:
    name: Deploy Azure Functions
    needs: detect-changes
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.func_changed == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.deploy_target == 'all' || inputs.deploy_target == 'functions'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
            echo "subscription_id=${{ vars.TVS_PROD_SUBSCRIPTION_ID }}" >> "$GITHUB_OUTPUT"
            echo "function_app_name=tvs-prod-mystoreguard-func" >> "$GITHUB_OUTPUT"
            echo "resource_group=${{ vars.TVS_PROD_APPSERVERS_RG }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == "bgclt-prod" ]]; then
            echo "env=bgclt-prod" >> "$GITHUB_OUTPUT"
            echo "subscription_id=${{ vars.BGCLT_SUBSCRIPTION_ID }}" >> "$GITHUB_OUTPUT"
            echo "function_app_name=bgclt-prod-mystoreguard-func" >> "$GITHUB_OUTPUT"
            echo "resource_group=${{ vars.BGCLT_PROD_APPSERVERS_RG }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
            echo "subscription_id=${{ vars.TVS_DEV_SUBSCRIPTION_ID }}" >> "$GITHUB_OUTPUT"
            echo "function_app_name=tvs-dev-mystoreguard-func" >> "$GITHUB_OUTPUT"
            echo "resource_group=${{ vars.TVS_DEV_APPSERVERS_RG }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install function dependencies
        run: |
          cd func
          pip install -r requirements.txt --target .python_packages/lib/site-packages

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ github.ref_name == 'bgclt-prod' && vars.BGCLT_AZURE_CLIENT_ID || vars.TVS_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.TVS_TENANT_ID }}
          subscription-id: ${{ steps.env.outputs.subscription_id }}

      - name: Deploy Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ steps.env.outputs.function_app_name }}
          package: func
