# CD Pipeline - Deploys to Azure Container Apps
# Deployment-only pipeline that uses images built by CI pipeline
# Automatically deploys after merge to main/dev (after CI builds the image)

# Runtime parameter for CD pipeline - allows manual image tag selection for rollback
parameters:
  - name: dockerImageTag
    displayName: 'Docker Image Tag (leave empty to auto-use commit SHA tag from CI)'
    type: string
    default: ''

# CD Trigger: Run automatically after merge to main or dev (after CI completes)
trigger:
  branches:
    include:
      - main1
      - dev1

# No PR trigger (only CI pipeline runs on PRs)
pr: none

variables:
  # Select variable group based on branch
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
    - group: 'prod'
    - name: env
      value: prod

  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/dev') }}:
    - group: 'dev'
    - name: env
      value: dev

  # Common variables
  - name: serviceName
    value: 'core-platform'
  - name: appName
    value: 'trovesuite'
  - name: dockerfilePath
    value: 'app/Dockerfile'
  - name: dockerBuildContext
    value: '.'
  - name: imageTag
    value: '$(Build.BuildId)'
  - name: latestTag
    value: 'latest'

  # Container registry variables
  - name: acrName
    value: 'trovesuite$(env)acr'
  - name: containerRegistry
    value: '$(acrName).azurecr.io'
  - name: imageFullName
    value: '$(containerRegistry)/$(serviceName):$(imageTag)'
  
  # CI Pipeline name - update this to match your CI pipeline name in Azure DevOps
  - name: ciPipelineName
    value: 'core-platform-ci'

stages:
  # Stage 1: Determine which image tag to deploy
  - stage: FindImageTag
    displayName: 'CD: Determine Image Tag'
    jobs:
      - job: FindImageTagJob
        displayName: 'Find Image Tag to Deploy'
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          - checkout: none

          # Determine which image tag to use for deployment
          - task: AzureCLI@2
            displayName: 'Determine Image Tag'
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "🔍 Determining which image to deploy..."
                echo "📝 Current commit: $(Build.SourceVersion)"
                echo "🌿 Current branch: $(Build.SourceBranch)"
                echo "🎯 Build reason: $(Build.Reason)"

                ACR_NAME="$(acrName)"
                IMAGE_NAME="$(serviceName)"

                # Login to ACR
                echo "🔐 Logging into ACR: $ACR_NAME"
                az acr login --name $ACR_NAME

                if [ -n "${{ parameters.dockerImageTag }}" ]; then
                  # Tag provided via parameter: Use it (for rollback or specific version)
                  DEPLOY_TAG="${{ parameters.dockerImageTag }}"
                  echo "🔙 Using provided tag parameter: $DEPLOY_TAG"

                elif [ "$(Build.Reason)" = "Manual" ]; then
                  # Manual trigger without tag: Use latest available build
                  echo "🔄 Manual deployment without tag - finding latest available image..."

                  # Try commit SHA first (if it exists)
                  COMMIT_SHA="$(Build.SourceVersion)"
                  COMMIT_TAG_EXISTS=$(az acr repository show-tags \
                    --name $ACR_NAME \
                    --repository $IMAGE_NAME \
                    --query "[?@ == '$COMMIT_SHA']" \
                    -o tsv 2>/dev/null || echo "")

                  if [ -n "$COMMIT_TAG_EXISTS" ]; then
                    DEPLOY_TAG="$COMMIT_SHA"
                    echo "✅ Found image for current commit: $DEPLOY_TAG"
                  else
                    # Fall back to latest numeric build ID
                    echo "🔍 No image for current commit, using latest build from ACR..."
                    LATEST_BUILD=$(az acr repository show-tags \
                      --name $ACR_NAME \
                      --repository $IMAGE_NAME \
                      --orderby time_desc \
                      --query "[?matches(@, '^[0-9]+$')] | [0]" \
                      -o tsv 2>/dev/null || echo "")

                    if [ -n "$LATEST_BUILD" ]; then
                      DEPLOY_TAG="$LATEST_BUILD"
                      echo "✅ Using latest build from ACR: $DEPLOY_TAG"
                    else
                      # Last resort: use 'latest' tag
                      DEPLOY_TAG="latest"
                      echo "⚠️ Using 'latest' tag"
                    fi
                  fi

                else
                  # Automatic trigger (after merge): Use commit SHA tag (most reliable)
                  # This ensures we deploy exactly what CI just built for this commit
                  echo "✅ Automatic deployment after merge - using commit SHA tag..."
                  COMMIT_SHA="$(Build.SourceVersion)"

                  echo "🔍 Looking for image with commit SHA tag: $COMMIT_SHA"
                  COMMIT_TAG_EXISTS=$(az acr repository show-tags \
                    --name $ACR_NAME \
                    --repository $IMAGE_NAME \
                    --query "[?@ == '$COMMIT_SHA']" \
                    -o tsv 2>/dev/null || echo "")

                  if [ -n "$COMMIT_TAG_EXISTS" ]; then
                    DEPLOY_TAG="$COMMIT_SHA"
                    echo "✅ Found image with commit SHA tag: $DEPLOY_TAG"
                    echo "   This ensures we deploy exactly what CI built for this commit"
                  else
                    # CI might still be running - wait a bit and retry
                    echo "⏳ Image not found yet, waiting 30s for CI to complete..."
                    sleep 30

                    COMMIT_TAG_EXISTS=$(az acr repository show-tags \
                      --name $ACR_NAME \
                      --repository $IMAGE_NAME \
                      --query "[?@ == '$COMMIT_SHA']" \
                      -o tsv 2>/dev/null || echo "")

                    if [ -n "$COMMIT_TAG_EXISTS" ]; then
                      DEPLOY_TAG="$COMMIT_SHA"
                      echo "✅ Found image with commit SHA tag: $DEPLOY_TAG"
                    else
                      echo "❌ ERROR: Could not find image with commit SHA: $COMMIT_SHA"
                      echo "💡 This usually means:"
                      echo "   1. CI pipeline hasn't completed yet - wait and retry"
                      echo "   2. CI pipeline failed - check CI build status"
                      echo "   3. Image wasn't tagged with commit SHA - check CI pipeline configuration"
                      echo ""
                      echo "🔧 Troubleshooting:"
                      echo "   - Check if CI pipeline is still running"
                      echo "   - Verify CI pipeline succeeded for commit: $COMMIT_SHA"
                      echo "   - List available tags: az acr repository show-tags --name $ACR_NAME --repository $IMAGE_NAME"
                      echo "   - For manual deploy, provide dockerImageTag parameter"
                      exit 1
                    fi
                  fi
                fi

                echo ""
                echo "📦 Final Deploy Tag: $DEPLOY_TAG"
                echo "##vso[task.setvariable variable=DeployImageTag;isOutput=true]$DEPLOY_TAG"
                echo "##vso[task.setvariable variable=DeployImageFullName;isOutput=true]$(containerRegistry)/$(serviceName):$DEPLOY_TAG"
            name: DetermineTag

  - stage: Deploy
    displayName: 'CD: Deploy to Azure Container Apps'
    dependsOn: FindImageTag
    variables:
      DeployImageTag: $[ stageDependencies.FindImageTag.FindImageTagJob.outputs['DetermineTag.DeployImageTag'] ]
      DeployImageFullName: $[ stageDependencies.FindImageTag.FindImageTagJob.outputs['DetermineTag.DeployImageFullName'] ]
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy to Azure Container Apps'
        environment: $(CONTAINER_APP_ENVIRONMENT)
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                # Azure CLI login
                - task: AzureCLI@2
                  displayName: 'Azure CLI Login'
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "✅ Logged in to Azure as:"
                      az account show

                # Deploy container image
                - task: AzureCLI@2
                  displayName: 'Deploy Image to Container App'
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      DEPLOY_IMAGE="$(containerRegistry)/$(serviceName):$(DeployImageTag)"
                      echo "🚀 Deploying image $DEPLOY_IMAGE ..."
                      echo "📦 Image Tag (CI Build ID): $(DeployImageTag)"
                      
                      # Verify image exists in ACR
                      echo "🔍 Verifying image exists in ACR..."
                      az acr repository show-tags \
                        --name $(acrName) \
                        --repository $(serviceName) \
                        --query "[?contains(@, '$(DeployImageTag)')]" \
                        --output table || echo "⚠️ Warning: Could not verify image tag"
                      
                      # Deploy the image
                      az containerapp update \
                        --name $(CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image $DEPLOY_IMAGE \
                        --output none
                      echo "✅ Deployment command executed."

                # Wait and check deployment readiness
                - task: Bash@3
                  displayName: 'Wait and Verify Deployment'
                  inputs:
                    targetType: inline
                    script: |
                      echo "⏳ Waiting for container app to be ready..."
                      sleep 45

                      FQDN=$(az containerapp show \
                        --name $(CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --query "properties.configuration.ingress.fqdn" \
                        -o tsv)

                      echo "🌐 App URL: https://$FQDN"
                      echo "🔍 Performing health check..."
                      curl -f "https://$FQDN/health" || echo "⚠️ Health check failed (may still be initializing)."

                      echo "##vso[task.setvariable variable=DeploymentUrl]https://$FQDN"
                      echo "✅ Deployment completed successfully at $(date)."
                      echo "📦 Deployed Image: $(containerRegistry)/$(serviceName):$(DeployImageTag)"

                      if [ "${{ parameters.dockerImageTag }}" != "" ]; then
                        echo "🔙 Rollback/Manual: Used provided tag $(DeployImageTag)"
                      else
                        echo "✅ Deployed CI build image with tag $(DeployImageTag)"
                      fi

