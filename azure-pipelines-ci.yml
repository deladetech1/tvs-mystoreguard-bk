# CI Pipeline - Builds and pushes Docker image
# Runs on: PRs and merges to dev or main

# Trigger on PRs to dev or main
pr:
  branches:
    include:
      - main1
      - dev1

# Trigger on merge/push to dev or main
trigger:
  branches:
    include:
      - main1
      - dev1

variables:
  # Load both variable groups - they will be used based on runtime conditions
  - group: 'dev'
  - group: 'prod'
  
  # Default environment (will be determined at runtime if needed)
  - name: env
    value: 'dev'

  # Common variables
  - name: serviceName
    value: 'core-platform'
  - name: appName
    value: 'trovesuite'
  - name: dockerfilePath
    value: 'app/Dockerfile'
  - name: dockerBuildContext
    value: '.'
  - name: imageTag
    value: '$(Build.BuildId)'
  - name: latestTag
    value: 'latest'

  # Container registry variables
  - name: acrName
    value: 'trovesuite$(env)acr'
  - name: containerRegistry
    value: '$(acrName).azurecr.io'
  - name: imageFullName
    value: '$(containerRegistry)/$(serviceName):$(imageTag)'

stages:
  - stage: Build
    displayName: 'CI: Build and Push Docker Image'
    jobs:
      - job: BuildJob
        displayName: 'Build Docker Image and Push to ACR'
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          - checkout: self
            fetchDepth: 0

          # Checkout SQL scripts repository (uses built-in Azure DevOps authentication)
          - checkout: git://trovesuite/sqlscripts
            displayName: 'Checkout SQL Scripts Repository'

          # Determine environment based on target branch (PR) or source branch (merge)
          - task: Bash@3
            displayName: 'Determine Environment'
            inputs:
              targetType: inline
              script: |
                # Check if this is a PR build or a merge/push build
                if [ -n "$(System.PullRequest.TargetBranch)" ]; then
                  # PR build: use target branch
                  TARGET_BRANCH="$(System.PullRequest.TargetBranch)"
                  echo "🔀 PR Build"
                  echo "🌿 Target Branch: $TARGET_BRANCH"
                else
                  # Merge/push build: use source branch
                  TARGET_BRANCH="$(Build.SourceBranch)"
                  echo "✅ Merge/Push Build"
                  echo "🌿 Source Branch: $TARGET_BRANCH"
                fi

                if [[ "$TARGET_BRANCH" == "refs/heads/main" ]]; then
                  ENV="prod"
                else
                  ENV="dev"
                fi
                echo "🏷️ Environment: $ENV"
                echo "##vso[task.setvariable variable=env]$ENV"
                echo "##vso[task.setvariable variable=acrName]trovesuite${ENV}acr"

          # Copy tenant SQL files to build context
          - task: Bash@3
            displayName: 'Copy Tenant SQL Files to Build Context'
            inputs:
              targetType: inline
              script: |
                echo "📋 Copying tenant SQL files to build context..."

                # Multiple checkouts creates directory structure: $(Build.SourcesDirectory)/{repo-name}
                MAIN_REPO="$(Build.SourcesDirectory)/core-platform-bk"
                SQL_REPO="$(Build.SourcesDirectory)/sqlscripts"

                echo "Main repo location: $MAIN_REPO"
                echo "SQL repo location: $SQL_REPO"

                # Create sql directory in main repo if it doesn't exist
                mkdir -p "$MAIN_REPO/sql"

                # Copy tenant directory from SQL scripts repo to main repo
                cp -r "$SQL_REPO/tenant" "$MAIN_REPO/sql/"

                # Verify the copy was successful
                if [ ! -f "$MAIN_REPO/sql/tenant/tables.sql" ]; then
                  echo "❌ Failed to copy tenant SQL files"
                  exit 1
                fi

                echo "✅ Tenant SQL files copied successfully"
                ls -la "$MAIN_REPO/sql/tenant/"

          # Login to ACR using service connection
          - task: Docker@2
            displayName: 'Login to Azure Container Registry'
            inputs:
              command: 'login'
              containerRegistry: '$(CONTAINER_REGISTRY_AUTH)'

          # Build and push image to ACR
          - task: Docker@2
            displayName: 'Build and Push Docker Image'
            inputs:
              command: 'buildAndPush'
              repository: $(serviceName)
              dockerfile: '$(Build.SourcesDirectory)/core-platform-bk/$(dockerfilePath)'
              buildContext: '$(Build.SourcesDirectory)/core-platform-bk'
              containerRegistry: '$(CONTAINER_REGISTRY_AUTH)'
              tags: |
                $(imageTag)
                $(latestTag)
                $(Build.SourceVersion)

          # Store build info for CD pipeline to reference
          - task: Bash@3
            displayName: 'Store Build Information'
            inputs:
              targetType: inline
              script: |
                mkdir -p $(Build.ArtifactStagingDirectory)/build-info
                echo "$(Build.BuildId)" > $(Build.ArtifactStagingDirectory)/build-info/build-id.txt
                echo "$(Build.SourceBranch)" > $(Build.ArtifactStagingDirectory)/build-info/source-branch.txt
                echo "$(Build.SourceVersion)" > $(Build.ArtifactStagingDirectory)/build-info/source-version.txt
                echo "$(System.PullRequest.SourceBranch)" > $(Build.ArtifactStagingDirectory)/build-info/pr-source-branch.txt || echo "" > $(Build.ArtifactStagingDirectory)/build-info/pr-source-branch.txt
                echo "$(System.PullRequest.TargetBranch)" > $(Build.ArtifactStagingDirectory)/build-info/pr-target-branch.txt || echo "" > $(Build.ArtifactStagingDirectory)/build-info/pr-target-branch.txt

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Build Info'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)/build-info'
              artifactName: 'build-info'
              publishLocation: 'Container'

          - task: Bash@3
            displayName: 'Display Build Info'
            inputs:
              targetType: inline
              script: |
                echo "✅ CI Build completed successfully"
                echo "📦 Image Tag: $(imageTag)"
                echo "📦 Image: $(imageFullName)"
                echo "🔖 Latest Tag: $(containerRegistry)/$(serviceName):$(latestTag)"
                echo "📝 Build ID: $(Build.BuildId)"
                echo "🌿 Source Branch: $(Build.SourceBranch)"
                echo "🔀 PR Source: $(System.PullRequest.SourceBranch)"
                echo "🎯 PR Target: $(System.PullRequest.TargetBranch)"