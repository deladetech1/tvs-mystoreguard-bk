trigger:
  branches:
    include:
      - main
      - dev

variables:
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
    - group: 'prod'
    - name: env
      value: prod

  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/dev') }}:
    - group: 'dev'
    - name: env
      value: dev

  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/owusu/initial-setup') }}:
    - group: 'dev'
    - name: env
      value: dev

  # Common variables
  - name: serviceName
    value: 'mystoreguard-bk'
  - name: appName
    value: 'trovesuite'
  - name: dockerfilePath
    value: 'app/Dockerfile'
  - name: dockerBuildContext
    value: '.'
  - name: imageTag
    value: '$(Build.BuildId)'
  - name: latestTag
    value: 'latest'
  - name: revisionSuffix
    value: '$(Build.BuildId)'

  # Registry variables here
  - name: acrName
    value: 'trovesuite$(env)acr1'
  - name: containerRegistry
    value: '$(acrName).azurecr.io'
  - name: imageFullName
    value: '$(containerRegistry)/$(serviceName):$(imageTag)'

stages:
  - stage: Build
    displayName: 'Build and Push Docker Image'
    jobs:
      - job: BuildJob
        displayName: 'Build Docker Image and Push to ACR'
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          - checkout: self
            fetchDepth: 0
            path: s/$(serviceName)
            displayName: Checkout repo

          # Login to ACR using service connection
          - task: Docker@2
            displayName: 'Login to Azure Container Registry'
            inputs:
              command: 'login'
              containerRegistry: $(CONTAINER_REGISTRY_AUTH)

          # Build and push image to ACR
          - task: Docker@2
            displayName: 'Build and Push Docker Image'
            inputs:
              command: 'buildAndPush'
              repository: $(serviceName)
              dockerfile: $(Agent.BuildDirectory)/s/$(serviceName)/$(dockerfilePath)
              buildContext: $(Agent.BuildDirectory)/s/$(serviceName)
              containerRegistry: $(CONTAINER_REGISTRY_AUTH)
              tags: |
                $(imageTag)
                $(latestTag)

  - stage: Deploy
    displayName: 'Deploy to Azure Container Apps'
    dependsOn: Build
    condition: succeeded()

    jobs:
      - deployment: DeployJob
        displayName: 'Deploy to Azure Container Apps'
        environment: $(CONTAINER_APP_ENVIRONMENT)
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                # Azure CLI login
                - task: AzureCLI@2
                  displayName: 'Azure CLI Login'
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "✅ Logged in to Azure as:"
                      az account show

                # Deploy new container image
                - task: AzureCLI@2
                  displayName: 'Deploy Updated Image to Container App'
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "🚀 Deploying image $(imageFullName) ..."
                      az containerapp update \
                        --name $(MSG_CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image $(imageFullName) \
                        --output none
                      echo "✅ Deployment command executed."